# ===================================
# LiteLLM Router 配置模板
# ===================================
# 配套文档：docs/LLM_CONFIG_GUIDE.md 第 3.2 节
#
# 用法：
# 1. 复制此文件为 litellm_config.yaml
# 2. 在 .env 中设置 LITELLM_CONFIG=./litellm_config.yaml
# 3. 按需配置下面的 model_list
#
# 密钥引用格式：
#   api_key: "os.environ/ENV_VAR_NAME"  → 从环境变量读取，避免明文写入文件
#   api_key: "sk-xxxxxxxx"              → 直接写入（不推荐）
#
# 更多文档: https://docs.litellm.ai/docs/proxy/configs
# ===================================

model_list:


  # --- OpenRouter (聚合平台) ---

  - model_name: zai/glm-4.7-flash
     litellm_params:
       model: zai/glm-4.7-flash
       api_key: "secrets/ZAI_API_KEY"
       api_base: https://open.bigmodel.cn/api/paas/v4
   
  - model_name: nvidia/qwen/qwen3.5-122b-a10b
     litellm_params:
       model: nvidia/qwen/qwen3.5-122b-a10b
       api_key: "secrets/NVIDIA_API_KEY"
       api_base: https://integrate.api.nvidia.com/v1
  

  # --- AIHubmix (OpenAI 兼容，一个 Key 使用多种模型) ---
  - model_name: gpt-4o-free
    litellm_params:
      model: gpt-4o-free
      api_key: "secrets/AIHUBMIX_KEY"
      api_base: https://aihubmix.com/v1

  - model_name: coding-minimax-m2.5-free
    litellm_params:
      model: coding-minimax-m2.5-free
      api_key: "secrets/AIHUBMIX_KEY"
      api_base: https://aihubmix.com/v1


  

  # --- siliconflow (OpenAI 兼容，一个 Key 使用多种模型) ---
  # 这是一个关于如何配置在LiteLLM自定义OpenAI兼容API接口的示例
  - model_name: deepseek-ai/DeepSeek-V3.2
    litellm_params:
      model: deepseek-ai/DeepSeek-V3.2
      api_key: "secrets/LITELLM_API_KEY" # 从环境变量读取 Key，安全防泄漏
      api_base: https://api.siliconflow.cn/v1
      # 以下配置是表示如何启用Qwen模型的enable_thinking开关
      extra_body:
        chat_template_kwargs:
          enable_thinking: true

  

 # --- DeepSeek 官方 API (原生 provider，自动解析 base_url) ---
  - model_name: deepseek/deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: "os.environ/DEEPSEEK_API_KEY"

  - model_name: deepseek/deepseek-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: "os.environ/DEEPSEEK_API_KEY"

  # --- Google Gemini (原生，多 Key 负载均衡) ---
  - model_name: gemini/gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: "os.environ/GEMINI_API_KEY_1"

  - model_name: gemini/gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: "os.environ/GEMINI_API_KEY_2"

  # --- Anthropic Claude (原生) ---
  # - model_name: anthropic/claude-3-5-sonnet-20241022
  #   litellm_params:
  #     model: anthropic/claude-3-5-sonnet-20241022
  #     api_key: "os.environ/ANTHROPIC_API_KEY"

  # --- Ollama 本地模型 ---
  # - model_name: ollama/qwen3:8b
  #   litellm_params:
  #     model: ollama/qwen3:8b
  #     api_base: http://localhost:11434

# ===================================
# Router 设置（可选）
# ===================================
router_settings:
  routing_strategy: simple-shuffle    # simple-shuffle / least-busy / latency-based
  num_retries: 5                      # 单个 deployment 失败后重试次数
  # timeout: 600                       # 请求超时（秒）
  # allowed_fails: 5                  # deployment 被冷却前允许的失败次数
  # cooldown_time: 360                 # deployment 冷却时间（秒）
